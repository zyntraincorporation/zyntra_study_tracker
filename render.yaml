services:
  - type: web
    name: zyntra-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false        # Set manually in Render dashboard
      - key: DIRECT_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_PIN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        sync: false        # Set to your Netlify URL
    autoDeploy: true
